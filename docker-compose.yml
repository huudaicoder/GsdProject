version: '3.8'
services:
  postgres:
    image: postgres:14
    container_name: kho-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: KhoThietBi
    ports:
      - "5432:5432"
    volumes:
      - kho_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  kho_pgdata:
