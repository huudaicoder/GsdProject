<div class="dashboard">
  <div class="dashboard-header">
    <h2 class="dashboard-title">Dashboard</h2>
    <p class="dashboard-subtitle">Tổng quan kho thiết bị</p>
  </div>

  <div class="kpi-grid">
    @for (card of kpiCards; track card.label) {
      <div class="kpi-card">
        <div class="kpi-card-header">
          <span class="kpi-label">{{ card.label }}</span>
          <i [class]="card.icon + ' kpi-icon'"></i>
        </div>
        <div class="kpi-value">{{ card.value }}</div>
      </div>
    }
  </div>

  <p class="kpi-notice">Dữ liệu sẽ hiển thị sau khi thiết bị được nhập vào hệ thống.</p>
</div>
